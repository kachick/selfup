name: 🔄 Sync Nix vendorHash
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '.github/workflows/sync-nix-vendor-hash.yml'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  sync-hash:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    steps:
      - name: Generate GitHub Apps token
        id: publish-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ steps.publish-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - uses: NixOS/nix-installer-action@main # There are no tagged releases
        with:
          extra-conf: |
            sandbox = true
            accept-flake-config = true

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: selfup
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Prepare Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install direnv
        run: |
          url="$(nix eval --raw --impure --expr '(builtins.fromJSON (builtins.readFile ./flake.lock)).nodes.nixpkgs.locked.url')"
          nix profile add "${url}#direnv"
      - name: Load environment variables
        run: |
          direnv allow .
          direnv export gha > "$GITHUB_ENV"

      - name: Bump vendorHash
        run: |
          nix-update selfup --version=skip --flake

      - name: Commits
        run: |
          git ls-files --modified '**.nix' | xargs git add
          git update-index -q --really-refresh
          git diff-index --quiet HEAD || git commit -m 'Bump vendorHash in go packages'

      - name: Push changes
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ "${CURRENT_SHA}" != "${HEAD_SHA}" ]; then
            git push origin HEAD:"${HEAD_REF}"
          fi
