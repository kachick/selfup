rules:
  unpinned-uses:
    config:
      policies:
        kachick/*: any
        actions/*: any
        NixOS/*: any
        crate-ci/*: any
        dependabot/*: any
        dprint/*: any
        cachix/*: any
  excessive-permissions:
    ignore:
      - merge-bot-pr.yml
  template-injection:
    ignore:
      - reusable-bump-flake-lock-and-selfup.yml
      - cleanup-staging-packages.yml
  secrets-outside-env:
    disable: true # TODO: Remove after disabled by default in v1.24.0: https://github.com/zizmorcore/zizmor/commit/9b125b5abe71034910d2bda1a88ba6600da3f64f
